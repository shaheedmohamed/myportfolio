<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#06060b" />
    <meta name="color-scheme" content="dark" />

    <!-- Primary SEO (fallback for crawlers that don't run JS — react-helmet overrides client-side) -->
    <title>Shaheed Mohamed — Creative Developer</title>
    <meta name="description" content="Portfolio of Shaheed Mohamed — Full-Stack Developer crafting next-level digital experiences with React, Node.js, Three.js and modern web technologies." />
    <meta name="author" content="Shaheed Mohamed" />
    <link rel="canonical" href="https://shaheedmohamed.dev/" />

    <!-- Open Graph fallback -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://shaheedmohamed.dev/" />
    <meta property="og:title" content="Shaheed Mohamed — Creative Developer" />
    <meta property="og:description" content="Full-Stack Developer crafting next-level digital experiences." />
    <meta property="og:image" content="https://shaheedmohamed.dev/og-image.jpg" />

    <!-- Twitter fallback -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shaheed Mohamed — Creative Developer" />
    <meta name="twitter:description" content="Full-Stack Developer crafting next-level digital experiences." />
    <meta name="twitter:image" content="https://shaheedmohamed.dev/og-image.jpg" />

    <!-- Icons & PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Shaheed" />

    <!-- Fonts: preconnect + non-blocking load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- DNS-prefetch for GitHub API used by Projects + GitHubStats -->
    <link rel="dns-prefetch" href="https://api.github.com" />
  </head>
  <body class="bg-black text-white overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
